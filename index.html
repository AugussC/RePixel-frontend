<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>RePixel Test</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./css/styles.css">

</head>

<body>

<div id="navbar"></div>

<section class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <div class="hero-text">
            <h1>
                ¡¡VEN A MEJORAR<br>
                TU IMAGEN CON<br>
                NOSOTROS!!
            </h1>
        </div>

        <div class="hero-logo">
            <div class="logo-circle">    
                <img src="./img/logo.png" alt="Logo RePixel">
            </div>
        </div>
    </div>
</section>

<section class="upload-section">
    <div class="upload-box text-center">
        <p class="upload-title">Suelte los archivos aquí</p>
        <p class="upload-subtitle">PNG, JPG, JPEG</p>

        <div class="upload-icons">
            <i class="bi bi-laptop"></i>
            <i class="bi bi-dropbox"></i>
            <i class="bi bi-google"></i>
        </div>

        <button class="btn btn-dark mt-3">
            Seleccione los archivos
        </button>
    </div>
</section>

<div class="container mt-5">
    <h1>Test conexión Backend</h1>

    <button id="miBoton" class="btn btn-light">
        Probar conexión
    </button>

    <p id="resultado" class="mt-3"></p>
</div>

<script src="./js/components/layout.js"></script>
<script type="module" src="./js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<div id="footer"></div>

</body>
</html>
