<head>
    <meta charset="UTF-8">
    <title>Login - RePixel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="login-body">

    <div id="navbar"></div>

    <section class="d-flex justify-content-center align-items-center vh-100">
        <div class="login-card shadow-lg p-4 text-center">

            <div class="logo mb-3">
                <img src="../img/logo.png" alt="logo" width="70">
                <h5 class="mt-2">REPIXEL</h5>
            </div>
            <h2 class="mb-2">Iniciar Sesión</h2>
            <p class="text-light small mb-4">
                Ingresa tus credenciales para acceder
            </p>
            <form>
                <div class="mb-3 text-start">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control input-custom">
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <input type="password" class="form-control input-custom">
                        <span class="input-group-text bg-white">
                            👁️
                        </span>
                    </div>
                </div>
                <button class="btn btn-custom w-100 mb-3">
                    Iniciar Sesión
                </button>
                <p class="small">
                    ¿No tienes cuenta?
                    <a href="/pages/registro.html">Regístrate</a>
                </p>
            </form>
        </div>
    </section>

    <div id="footer"></div>
    <script src="../js/components/layout.js"></script>
</body>
