<head>
    <meta charset="UTF-8">
    <title>Login - RePixel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar"></div>
    <div class="container-fluid register-section py-5">
    <div class="d-flex justify-content-center">

        <div class="register-card p-4">

            <h2 class="text-center mb-2">Crear Cuenta</h2>
            <p class="text-center mb-4">Regístrate para comenzar a mejorar tus imágenes</p>

            <form>
                <div class="row mb-3">
                    <div class="col">
                        <label>Nombre</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col">
                        <label>Apellido</label>
                        <input type="text" class="form-control">
                    </div>
                </div>

                <div class="mb-3">
                    <label>Correo electrónico</label>
                    <input type="email" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Contraseña</label>
                    <input type="password" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Confirmar Contraseña</label>
                    <input type="password" class="form-control">
                </div>

                <button class="btn btn-register w-100">Registrarse</button>

                <p class="text-center mt-3 small">
                    ¿Ya tienes cuenta? 
                    <a href="/pages/login.html">Inicia sesión</a>
                </p>
            </form>

        </div>
    </div>
</div>    
    <div id="footer"></div>
    <script src="../js/components/layout.js"></script>
</body>
