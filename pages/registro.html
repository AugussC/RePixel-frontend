<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar"></div>
    <div class="container-fluid register-section py-5">
    <div class="d-flex justify-content-center">

        <div class="register-card p-4">

            <h2 class="text-center mb-2">Crear Cuenta</h2>
            <p class="text-center mb-4">Regístrate para comenzar a mejorar tus imágenes</p>

            <form id="registerForm">
                <div class="row mb-3">
                    <div class="col">
                        <label>Nombre</label>
                        <input type="text" id="nombre" class="form-control" required>
                        <small id="errorNombre" class="text-danger"></small>
                    </div>
                    <div class="col">
                        <label>Apellido</label>
                        <input type="text" id="apellido" class="form-control" required>
                        <small id="errorApellido" class="text-danger"></small>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Correo electrónico</label>
                    <input type="email" id="correo" class="form-control" required>
                    <small id="errorCorreo" class="text-danger"></small>
                </div>

                <div class="mb-3">
                    <label>Contraseña</label>
                    <input type="password" id="contraseña" class="form-control" required>
                    <small id="errorContraseña" class="text-danger"></small>
                </div>

                <div class="mb-3">
                    <label>Confirmar Contraseña</label>
                    <input type="password" id="confirmarContraseña" class="form-control" required>
                    <small id="errorConfirmarContraseña" class="text-danger"></small>
                </div>

                <button type="submit" class="btn btn-register w-100">Registrarse</button>
            </form>
            <p class="text-center mt-3 small">
                    ¿Ya tienes cuenta? 
                    <a href="/pages/login.html">Inicia sesión</a>
                </p>

        </div>
    </div>
</div>    
    <div id="footer"></div>
    <script type="module" src="../js/pages/register.js"></script>
    <script src="../js/components/layout.js"></script>
</body>
