<head>
    <meta charset="UTF-8">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar"></div>
    <div class="container-subida">
        <div id="bloque-inicial">
            <h1>Mejore sus imágenes</h1>
            <p>Mejore sus imágenes en pocos pasos y note la diferencia</p>
            <div class="upload-container">
                <label class="upload-box" for="fileInput" style="cursor: pointer;">
                    <div class="icon">
                        <i class="bi bi-laptop"></i>
                        <i class="bi bi-box-seam"></i>
                        <i class="bi bi-google"></i>
                    </div>
                    <span>Suelte los archivos aquí</span>
                    <small id="tipos-texto" style="color: white; font-size: 0.875em;"></small>
                    <input type="file" id="fileInput" accept=".png, .jpg, .jpeg" hidden>
                </label>
                <div id="status-message"></div>
            </div>
        </div>

        <div id="editor-section" class="editor-layout" style="display: none;">
            <div class="editor-viewer">
                <div class="viewer-header">
                    <button class="btn btn-custom" id="btnNuevaImagen">
                        <i class="bi bi-upload"></i> Nueva Imagen
                    </button>
                    <button class="btn btn-custom" id="btnReiniciar">
                        <i class="bi bi-arrow-counterclockwise"></i> Reiniciar
                    </button>
                    <button class="btn btn-custom" id="btnDescargar" disabled>
                        <i class="bi bi-download"></i> Descargar
                    </button>
                </div>

                <div id="editor-status" class="w-100 mb-3" style="display: none;"></div>

                <div class="viewer-content d-flex justify-content-center align-items-center gap-3">
                    <div class="canvas-panel">
                        <h5 class="text-light fw-bold text-center">Imagen Original</h5>
                        <div id="viewer-original" class="viewer">
                            <canvas id="canvas-original"></canvas>
                        </div>
                        <div class="zoom-container">
                            <label for="zoom-original">Zoom</label>
                            <input type="range" min="1" max="11" step="0.1" value="1" id="zoom-original">
                        </div>
                    </div>


                    <div class="canvas-panel d-none" id="panel-resultado">
                        <h5 class="text-light fw-bold text-center">Imagen Procesada</h5>
                        <div id="viewer-resultado" class="viewer">
                            <canvas id="canvas-resultado"></canvas>
                        </div>
                        <div class="zoom-container">
                            <label for="zoom-resultado">Zoom</label>
                            <input type="range" min="1" max="11" step="0.1" value="1" id="zoom-resultado">
                        </div>
                    </div>
                </div>
            </div>

            <div class="tools-sidebar">
                <h4>Herramientas</h4>
                <p class="tool-subtitle">
                    Selecciona una herramienta para mejorar tu imagen
                </p>

                <button class="tool-btn" id="btnMejorar">
                    <i class="bi bi-magic"></i>
                    <div>
                        <span>Mejorar Calidad</span>
                        <small>Mejora automática</small>
                    </div>
                </button>

                <button class="tool-btn" id="btnBrillo">
                    <i class="bi bi-brightness-high"></i>
                    <div>
                        <span>Ajustar Brillo</span>
                        <small>Corregir iluminación</small>
                    </div>
                </button>

                <button class="tool-btn" id="btnQuitarRuido">
                    <i class="bi bi-eraser"></i>
                    <div>
                        <span>Quitar Ruido</span>
                        <small>Reducir ruido</small>
                    </div>
                </button>

                <button class="tool-btn" id="btnBlancoyNegro">
                    <i class="bi bi-yin-yang"></i>
                    <div>
                        <span>Blanco y Negro</span>
                        <small>Convertir a escala de grises</small>
                    </div>
                </button>

                <button class="tool-btn" id="btnRestaurar">
                    <i class="bi bi-arrow-clockwise"></i>
                    <div>
                        <span>Restaurar imagen</span>
                        <small>Recuperar detalles de la imagen</small>
                    </div>
                </button>
            </div>
        </div>
    </div>
    <div id="footer"></div>

    <script type="module" src="../js/pages/inicio.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>
    <script src="../js/components/layout.js"></script>
</body>
