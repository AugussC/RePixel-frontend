<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar"></div>
    <div class="container-subida">
        <div id="bloque-inicial">
            <h1>Mejore sus imágenes</h1>
            <p>Mejore sus imágenes en pocos pasos y note la diferencia</p>
            <div class="upload-container">
                <label class="upload-box" for="fileInput" style="cursor: pointer;">
                    <div class="icon">
                        <i class="bi bi-laptop"></i>
                        <i class="bi bi-box-seam"></i>
                        <i class="bi bi-google"></i>
                    </div>
                    <span>Suelte los archivos aquí</span>
                    <small>PNG, JPG, JPEG</small>
                    <input type="file" id="fileInput" accept=".png, .jpg, .jpeg" hidden>
                </label>
                <div id="status-message"></div>
            </div>
        </div>
        <h3>Ver Imagen</h3>
        <div id="viewer">
            <canvas id="canvas"></canvas>
        </div>
        <br>
        Zoom:
        <input type="range" min="1" max="11" step="0.1" value="1" id="zoom">
    </div>
    <div id="footer"></div>

    <script src="../js/components/layout.js"></script>
    <script type="module" src="../js/pages/inicio.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>
    <script src="../js/components/layout.js"></script>
</body>
