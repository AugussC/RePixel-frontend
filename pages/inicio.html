<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div id="navbar"></div>
    <div class="container-subida">
        <h1>Mejore sus imágenes</h1>
        <p>Mejore sus imágenes en pocos pasos y note la diferencia</p>
        <div class="upload-container">
            <label class="upload-box" for="fileInput" style="cursor: pointer;">
                <div class="icon">
                    <i class="bi bi-laptop"></i>
                    <i class="bi bi-box-seam"></i>
                    <i class="bi bi-google"></i>
                </div>
                <span>Suelte los archivos aquí</span>
                <small>PNG, JPG, JPEG</small>
                <input type="file" id="fileInput" accept=".png, .jpg, .jpeg" hidden>
            </label>

            <div id="status-message"></div>
        </div>
        <h3>Ver Imagen</h3>
        <div id="viewer">
            <canvas id="canvas"></canvas>
        </div>
        <br>
        Zoom:
        <input type="range" min="1" max="11" step="0.1" value="1" id="zoom">
    </div>
    <script>
let currentImageId = null;
let scale = 1;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const viewer = document.getElementById('viewer');
const zoomSlider = document.getElementById('zoom');
const fileInput = document.getElementById('fileInput');
const statusMessage = document.getElementById('status-message');

let img = new Image();

// --- Lógica del Canvas (Zoom y Dibujo) ---
function draw() {
    if (!img.complete || !img.src) return;
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;
    ctx.imageSmoothingEnabled = false; // Mantiene el estilo pixelado al hacer zoom
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    // Dibujar grilla si el zoom es alto
    if (scale > 5) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
        ctx.lineWidth = 1;
        for (let x = 0; x <= img.width; x++) {
            ctx.moveTo(x * scale, 0);
            ctx.lineTo(x * scale, canvas.height);
        }
        for (let y = 0; y <= img.height; y++) {
            ctx.moveTo(0, y * scale);
            ctx.lineTo(canvas.width, y * scale);
        }
        ctx.stroke();
    }
}

// Eventos de Zoom
zoomSlider.addEventListener('input', () => {
    scale = parseFloat(zoomSlider.value);
    draw();
});

viewer.addEventListener('wheel', (e) => {
    e.preventDefault();
    scale += e.deltaY < 0 ? 0.2 : -0.2;
    scale = Math.min(Math.max(scale, 1), 11);
    zoomSlider.value = scale;
    draw();
});

// Función para cargar imagen en el visor
function mostrarImagen(src) {
    img.src = src;
    img.onload = () => {
        scale = 1; // Resetear zoom al cargar nueva
        zoomSlider.value = 1;
        draw();
    };
}

// --- Manejo de Subida de Archivo ---
fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Validación rápida
    const allowedTypes = ["image/png", "image/jpeg", "image/jpg"];
    if (!allowedTypes.includes(file.type)) {
        alert("Solo se permiten archivos PNG o JPG");
        return;
    }

    statusMessage.innerHTML = `<span class="text-primary">Subiendo...</span>`;

    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch("http://127.0.0.1:5000/images", {
            method: "POST",
            body: formData,
            credentials: "include"
        });

        const data = await res.json();

        if (res.ok) {
            statusMessage.innerHTML = `<span class="text-success">¡Imagen subida con éxito!</span>`;
            currentImageId = data.id;  
            
            // Cargamos la imagen desde el backend al canvas
            mostrarImagen(`http://127.0.0.1:5000/images/${currentImageId}/view`);
        } else {
            statusMessage.innerHTML = `<span class="text-danger">Error: ${data.error}</span>`;
        }
    } catch (err) {
        console.error("Error en fetch:", err);
        statusMessage.innerHTML = `<span class="text-danger">Error de conexión con el servidor</span>`;
    }
});
</script>
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>
    <script src="../js/components/layout.js"></script>

</body>
