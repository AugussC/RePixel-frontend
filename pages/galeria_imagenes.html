<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <title>Login - RePixel</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="../css/styles.css">
    </head>

<body>
    <div id="navbar"></div>
    <div class="container-fluid gallery-section d-flex flex-column align-items-center">
        <h1 class="text-center mt-5">Galeria de Imagenes</h1>
        <p class="subheader text-center mb-5">Las imagenes se almacenarán durante 12 horas</p>

        <div class="gallery-box mx-auto">
            
            <div class="file-row">
                <div class="file-name">ImagenFondo</div>
                <div class="file-info">PNG / 154 KB</div>
                <div class="file-actions">
                    <button class="btn btn-download">Descargar</button>
                    <button type="button" class="btn-close" aria-label="Close"></button>
                </div>
            </div>

           <div class="file-row">
                <div class="file-name">persona_sonriendo</div>
                <div class="file-info">JPG / 1354 KB</div>
                <div class="file-actions">
                    <button class="btn btn-download">Descargar</button>
                    <button type="button" class="btn-close" aria-label="Close"></button>
                </div>
            </div>

            <button class="btn btn-custom">
                <span class="me-2">🔄</span> Convierta más archivos
            </button>
        </div>

        <div class="mt-4">
            
        </div>
    </div>
    
    <script src="../js/components/layout.js"></script>
    <script type="module" src="./js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <div id="footer"></div>
</body>

</html>
