<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RePixel - Galería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #4a3da8; /* fondo general morado */
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .navbar-custom {
            background-color: #43378b;
            
        }

        .gallery-box {
            background-color: #8c7fe1; /* Fondo blanco para la barra de archivos */
            color: #333; /* Texto oscuro para contraste */
            border-radius: 4px;
            padding: 15px 25px;
            max-width: 1000px; /* Más ancho para formato lista */
            width: 95%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .file-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .file-name {
            flex: 2; /* Toma más espacio para el nombre */
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-info {
            flex: 1; /* Espacio fijo para el tipo/peso */
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .file-actions {
            flex: 1; /* Espacio para botones */
            text-align: right;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
        }
    

        .btn-custom {
            background-color: #43378b;
            color: #fff;
            border: none;
            padding: 10px;
            font-weight: bold;
            width: 100%;
        }

        .btn-custom:hover {
            background-color: #5b4bb6;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: bold;
        }

        p {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container-fluid d-flex flex-column align-items-center">
        <h1 class="text-center mt-5">Galeria de Imagenes</h1>
        <p class="subheader text-center mb-5">Las imagenes se almacenarán durante 12 horas</p>

        <div class="gallery-box mx-auto">
            
            <div class="file-row">
                <div class="file-name">ImagenFondo</div>
                <div class="file-info">PNG / 154 KB</div>
                <div class="file-actions">
                    <button class="btn btn-download">Descargar</button>
                    <button type="button" class="btn-close" aria-label="Close"></button>
                </div>
            </div>

           <div class="file-row">
                <div class="file-name">persona_sonriendo</div>
                <div class="file-info">JPG / 1354 KB</div>
                <div class="file-actions">
                    <button class="btn btn-download">Descargar</button>
                    <button type="button" class="btn-close" aria-label="Close"></button>
                </div>
            </div>

            <button class="btn btn-custom">
                <span class="me-2">🔄</span> Convierta más archivos
            </button>
        </div>

        <div class="mt-4">
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
