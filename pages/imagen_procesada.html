<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RePixel - Imagen Procesada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
 <style>
        .result-box {
            background-color: #8c7fe1; /* Color de fondo del cuadro de la imagen */
            padding: 30px;
            border-radius: 8px;
            display: inline-block; /* Hace que el contenedor se ajuste al contenido */
        }

        .img-preview {
            max-width: 100%; /* Hace que la imagen no se salga del contenedor */
            height: auto;    /* Mantiene la proporción original */
            display: block;
            margin: 0 auto 20px auto; /* Centra la imagen y agrega espacio debajo */
        }

        .btn-custom {
            background-color: #43378b;
            color: #fff;
            border: none;
            padding: 10px;
            font-weight: bold;
        }
        
        .btn-custom:hover {
            background-color: #5b4bb6;
        }
        
    </style>
<body>

    <div class="result-container d-flex align-items-center justify-content-center py-5">
    <div class="result-box text-center">
        <h2 class="h4 mb-4 " style="font-weight: bold;">Imagen Procesada</h2>
        <img src="https://cdn.pixabay.com/photo/2016/02/10/21/59/landscape-1192669_640.jpg" class="img-preview mb-3" alt="Procesada">
        <div class="d-grid gap-2">
            <button class="btn btn-custom">Descargar</button>
        </div>
    </div>
</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
